<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>颜色对照</title>
<style>
body{background:#1a1a2e;color:#fff;font-family:system-ui;padding:30px;}
h2{margin-bottom:20px;}
.row{display:flex;align-items:center;margin:12px 0;}
.swatch{width:50px;height:50px;border-radius:50%;margin-right:20px;border:2px solid #444;}
.dark-swatch{border-color:#888;}
.circle{width:24px;height:24px;border-radius:50%;display:inline-block;margin-right:12px;vertical-align:middle;}
.gap-section{margin:40px 0 20px;padding-top:20px;border-top:1px solid #444;}
.compare{display:flex;gap:40px;align-items:center;}
.big{width:80px;height:80px;border-radius:50%;margin-right:20px;font-size:14px;display:flex;align-items:center;justify-content:center;}
</style></head><body>
<h2>全部七色</h2>
<div class="row"><div class="swatch" style="background:#52c41a;"></div><span style="color:#52c41a">#52c41a</span>&nbsp;&nbsp;正常 (绿)</div>
<div class="row"><div class="swatch" style="background:#fa8c16;"></div><span style="color:#fa8c16">#fa8c16</span>&nbsp;&nbsp;普通预警 (橙)</div>
<div class="row"><div class="swatch" style="background:#ff4d4f;"></div><span style="color:#ff4d4f">#ff4d4f</span>&nbsp;&nbsp;高风险预警 (红)</div>
<div class="row"><div class="swatch" style="background:#1890FF;"></div><span style="color:#1890FF">#1890FF</span>&nbsp;&nbsp;监测中 (蓝)</div>
<div class="row"><div class="swatch" style="background:#722ed1;"></div><span style="color:#722ed1">#722ed1</span>&nbsp;&nbsp;等待首次数据 (紫)</div>

<div class="gap-section"><h2>#ffffff vs #666666 对比</h2>
<div class="compare">
<div style="text-align:center">
<div class="big" style="background:#ffffff;color:#333;">#ffffff</div>
<div>数据不可用 (白)</div>
</div>
<div style="font-size:40px;color:#888;">← →</div>
<div style="text-align:center">
<div class="big" style="background:#666666;color:#ccc;">#666666</div>
<div>离线 (深灰)</div>
</div>
</div>
</div>
</body></html>
