<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热应激预警系统 - 登录</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1f3c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        /* 背景动画粒子 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(24, 144, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(0, 210, 255, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(114, 46, 209, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }
        .login-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 48px 40px;
            width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 60px rgba(0,0,0,0.4);
            position: relative;
            z-index: 1;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header .logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #1890FF, #00D2FF);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #fff;
        }
        .login-header h2 {
            color: #e8eaed;
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 2px;
        }
        .login-header p {
            color: rgba(255,255,255,0.45);
            font-size: 13px;
            margin-top: 6px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.65);
            font-size: 13px;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #e8eaed;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: #1890FF;
            box-shadow: 0 0 0 3px rgba(24,144,255,0.15);
            background: rgba(255,255,255,0.1);
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.25); }
        .error-msg {
            color: #ff4d4f;
            font-size: 13px;
            text-align: center;
            margin-bottom: 16px;
            padding: 8px;
            background: rgba(255,77,79,0.1);
            border-radius: 6px;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1890FF, #096dd9);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #40a9ff, #1890FF);
            box-shadow: 0 4px 20px rgba(24,144,255,0.4);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">🌡️</div>
            <h2>热应激预警系统</h2>
            <p>Heat Stress Warning System</p>
        </div>
        <form method="POST">
            {% csrf_token %}
            {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>
    </div>
</body>
</html>
