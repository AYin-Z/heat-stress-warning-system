<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热应激预警系统 - 指挥大屏</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            background: #0a0e17;
            color: #c8d6e5;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
        }
        /* ========== 顶部标题栏 ========== */
        #header {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: linear-gradient(180deg, rgba(16,24,40,1) 0%, rgba(10,14,23,0.95) 100%);
            border-bottom: 1px solid rgba(24,144,255,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }
        #header .title {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #1890FF, #00D2FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #header .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
        }
        #header select {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            color: #c8d6e5;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }
        #header select:focus { border-color: #1890FF; }
        #header select option { background: #1a2a4a; color: #c8d6e5; }
        .btn {
            background: rgba(24,144,255,0.15);
            border: 1px solid rgba(24,144,255,0.3);
            color: #1890FF;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .btn:hover { background: rgba(24,144,255,0.25); }
        .btn-danger { border-color: rgba(255,77,79,0.3); color: #ff4d4f; background: rgba(255,77,79,0.1); }
        .btn-danger:hover { background: rgba(255,77,79,0.2); }
        .time-display { color: rgba(255,255,255,0.6); font-size: 14px; }

        /* ========== 左侧统计面板 ========== */
        #left-panel {
            position: absolute;
            top: 70px; left: 12px;
            width: 300px;
            bottom: 12px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .panel-box {
            background: rgba(16,24,40,0.85);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 16px;
            backdrop-filter: blur(10px);
        }
        .panel-box .panel-title {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 14px;
            background: #1890FF;
            border-radius: 2px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { font-size: 13px; color: rgba(255,255,255,0.55); }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-online { color: #52c41a; }
        .stat-offline { color: #666666; }
        .stat-monitoring { color: #1890FF; }
        .stat-unavailable { color: #ffffff; }
        .stat-alert { color: #ff4d4f; }
        .stat-unit { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.4); margin-left: 4px; }

        /* 徽标 */
        .badge {
            display: inline-block; min-width: 20px; padding: 1px 7px;
            font-size: 11px; font-weight: 600; line-height: 1.6;
            text-align: center; border-radius: 10px; margin-left: 6px;
        }
        .badge-red { background: rgba(255,77,79,0.2); color: #ff4d4f; }
        .badge-blue { background: rgba(24,144,255,0.2); color: #1890FF; }

        /* 饼图容器 */
        #pie-chart { width: 100%; height: 200px; }

        /* ========== 地图区域 ========== */
        #map-container {
            position: absolute;
            top: 70px; left: 324px; right: 320px; bottom: 12px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            z-index: 1;
        }
        #amap { width: 100%; height: 100%; }

        /* 地图图例 */
        .map-legend {
            position: absolute;
            bottom: 20px; left: 20px;
            background: rgba(16,24,40,0.9);
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 11px;
            z-index: 200;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        /* ========== 右侧历史面板 ========== */
        #right-panel {
            position: absolute;
            top: 70px; right: 12px;
            width: 296px;
            bottom: 12px;
            background: rgba(16,24,40,0.85);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            transition: width 0.3s ease;
        }
        #right-panel.collapsed { width: 40px; }
        #right-panel.collapsed .panel-header { justify-content: center; padding: 14px 8px; }
        #right-panel.collapsed #sidebar-toggle { padding: 2px 0; }
        #right-panel.collapsed #alert-list,
        #right-panel.collapsed .panel-header-text,
        #right-panel.collapsed .panel-header-count { display: none; }
        #sidebar-toggle {
            background: none; border: none; color: rgba(255,255,255,0.5);
            cursor: pointer; font-size: 16px; padding: 2px 6px; transition: color 0.3s;
        }
        #sidebar-toggle:hover { color: #fff; }
        #right-panel .panel-header {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        #alert-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        #alert-list::-webkit-scrollbar { width: 4px; }
        #alert-list::-webkit-scrollbar-track { background: transparent; }
        #alert-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .alert-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 12px;
            border-left: 3px solid;
            animation: slideIn 0.3s ease;
        }
        .alert-warning {
            background: linear-gradient(135deg, rgba(250,173,20,0.12) 0%, rgba(250,140,20,0.04) 100%);
            border-left-color: #faad14;
        }
        .alert-high-risk {
            background: linear-gradient(135deg, rgba(255,77,79,0.14) 0%, rgba(255,50,50,0.04) 100%);
            border-left-color: #ff4d4f;
        }
        .alert-item .alert-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .alert-item .alert-detail { color: rgba(255,255,255,0.5); font-size: 11px; }
        .alert-item .alert-temp { font-size: 14px; font-weight: 700; }
        .alert-item .alert-time { color: rgba(255,255,255,0.35); font-size: 10px; margin-top: 4px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* ========== 预警弹窗 ========== */
        #alert-popup {
            position: fixed;
            bottom: 30px; right: 330px;
            width: 400px;
            background: rgba(16,24,40,0.95);
            border: 1px solid #ff4d4f;
            border-radius: 10px;
            z-index: 1000;
            box-shadow: 0 8px 40px rgba(255,77,79,0.3);
            animation: popIn 0.4s ease;
            display: none;
        }
        #alert-popup.high-risk { border-color: #ff4d4f; }
        #alert-popup.warning { border-color: #faad14; }
        #alert-popup .pop-header {
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #alert-popup.high-risk .pop-header { color: #ff4d4f; }
        #alert-popup.warning .pop-header { color: #faad14; }
        #alert-popup .pop-body { padding: 0 18px 14px; font-size: 13px; line-height: 1.8; }
        #alert-popup .pop-body .pop-row { display: flex; justify-content: space-between; margin: 6px 0; }
        #alert-popup .pop-body .pop-label { color: rgba(255,255,255,0.5); }
        #alert-popup .pop-footer {
            padding: 12px 18px;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        @keyframes popIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* ========== 二级详情弹窗 ========== */
        #detail-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 900;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #detail-modal .modal-content {
            background: rgba(16,24,40,0.98);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            width: 520px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        #detail-modal .modal-header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: 600;
        }
        #detail-modal .modal-body { padding: 20px 24px; }
        #detail-modal .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        #detail-modal .info-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        #detail-modal .info-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
        #detail-modal .info-value { font-size: 18px; font-weight: 600; }
        #detail-modal .trajectory-title { margin: 18px 0 8px; font-size: 14px; color: rgba(255,255,255,0.6); }
        #detail-modal .mini-map { width: 100%; height: 180px; border-radius: 8px; overflow: hidden; }
        #detail-modal .close-btn {
            background: none; border: none; color: rgba(255,255,255,0.5);
            font-size: 22px; cursor: pointer; padding: 4px 8px;
        }
        #detail-modal .close-btn:hover { color: #fff; }
    </style>
</head>
<body>

<!-- 顶部标题栏 -->
<div id="header">
    <span class="title">🌡️ 热应激预警指挥中心</span>
    <div class="header-right">
        <span class="time-display" id="live-time">--</span>
        <span style="background:rgba(24,144,255,0.15);color:#1890FF;padding:4px 14px;border-radius:12px;font-size:13px;">
            📍 {{ current_project.name|default:"无项目" }}
        </span>
        <a href="{% url 'projects' %}" class="btn" style="text-decoration:none;">📋 项目管理</a>
        <a href="{% url 'users' %}" class="btn" style="text-decoration:none;">👥 用户管理</a>
        <button class="btn btn-danger" onclick="clearAlerts()">🗑️ 清除预警</button>
        <a href="{% url 'logout' %}" style="color:rgba(255,255,255,0.4);text-decoration:none;font-size:12px;">退出</a>
    </div>
</div>

<!-- 左侧统计面板 -->
<div id="left-panel">
    <div class="panel-box" style="flex:0;">
        <div class="panel-title">📊 设备状态</div>
        <div class="stat-row">
            <span class="stat-label">在线设备</span>
            <span class="stat-value stat-online" id="online-count">0<span class="stat-unit">台</span></span>
        </div>
        <div class="stat-row">
            <span class="stat-label">监测中</span>
            <span class="stat-value stat-monitoring" id="monitoring-count">0<span class="stat-unit">台</span></span>
        </div>
        <div class="stat-row">
            <span class="stat-label">数据不可用</span>
            <span class="stat-value stat-unavailable" id="unavailable-count">0<span class="stat-unit">台</span></span>
        </div>
        <div class="stat-row">
            <span class="stat-label">等待首次数据</span>
            <span class="stat-value" style="color:#722ed1;" id="awaiting-data-count">0<span class="stat-unit">台</span></span>
        </div>
        <div class="stat-row">
            <span class="stat-label">离线设备</span>
            <span class="stat-value stat-offline" id="offline-count">0<span class="stat-unit">台</span></span>
        </div>
        <div class="stat-row">
            <span class="stat-label">今日预警</span>
            <span class="stat-value stat-alert" id="today-alert-count">0<span class="stat-unit">条</span></span>
        </div>
    </div>
    <div class="panel-box" style="flex:1;">
        <div class="panel-title">📈 风险概况</div>
        <div id="pie-chart"></div>
    </div>
</div>

<!-- 地图主体 -->
<div id="map-container">
    <div id="amap"></div>
    <div class="map-legend">
        <span class="legend-item"><span class="legend-dot" style="background:#52c41a;"></span> 正常</span>
        <span class="legend-item"><span class="legend-dot" style="background:#fa8c16;"></span> 预警</span>
        <span class="legend-item"><span class="legend-dot" style="background:#ff4d4f;"></span> 高风险</span>
        <span class="legend-item"><span class="legend-dot" style="background:#1890FF;"></span> 监测中</span>
        <span class="legend-item"><span class="legend-dot" style="background:#ffffff;"></span> 数据不可用</span>
        <span class="legend-item"><span class="legend-dot" style="background:#666666;"></span> 离线</span>
        <span class="legend-item"><span class="legend-dot" style="background:#722ed1;"></span> 等待首次数据</span>
    </div>
</div>

<!-- 右侧历史记录 -->
<div id="right-panel">
    <div class="panel-header">
        <span class="panel-header-text">📋 预警历史</span>
        <span class="badge badge-red panel-header-count" id="alert-badge" style="display:none;">0</span>
        <button id="sidebar-toggle" onclick="toggleSidebar()" title="折叠/展开">◀</button>
    </div>
    <div id="alert-list">
        <div style="text-align:center;color:rgba(255,255,255,0.3);padding:40px 0;font-size:13px;">暂无预警记录</div>
    </div>
</div>

<!-- 预警弹窗 -->
<div id="alert-popup">
    <div class="pop-header">
        <span id="pop-alert-icon">🚨</span>
        <span id="pop-alert-type">高风险预警</span>
        <button style="background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:18px;" onclick="closeAlertPopup()">✕</button>
    </div>
    <div class="pop-body">
        <div class="pop-row"><span class="pop-label">民警姓名</span><span id="pop-name">--</span></div>
        <div class="pop-row"><span class="pop-label">设备编号</span><span id="pop-device-id">--</span></div>
        <div class="pop-row"><span class="pop-label">核心温度</span><span id="pop-temp" style="font-weight:700;font-size:16px;">--</span></div>
        <div class="pop-row"><span class="pop-label">心率</span><span id="pop-hr">--</span></div>
        <div class="pop-row"><span class="pop-label">处置建议</span></div>
        <div id="pop-advice" style="background:rgba(255,255,255,0.03);padding:8px;border-radius:4px;margin-top:4px;font-size:12px;white-space:pre-line;">--</div>
    </div>
    <div class="pop-footer">
        <button class="btn" onclick="confirmAlert()">✓ 确认并推送建议</button>
        <button class="btn btn-danger" onclick="closeAlertPopup()">关闭</button>
    </div>
</div>

<!-- 民警详情弹窗 -->
<div id="detail-modal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modal-title">👤 民警详情</span>
            <button class="close-btn" onclick="closeDetailModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="info-grid" id="detail-info-grid"></div>
            <div class="trajectory-title">📍 近2小时活动轨迹</div>
            <div class="mini-map" id="mini-map"></div>
        </div>
    </div>
</div>

<!-- 高德地图 JS API -->
<script>
    window._AMAP_SECURITY_CONFIG = {
        securityJsCode: '{{ amap_secret }}',
    };
</script>
<script src="https://webapi.amap.com/maps?v=2.0&key={{ amap_key }}&callback=onMapLoaded" async defer></script>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>
    let map = null;
    let markers = {};
    const currentProjectId = '{{ current_project.id|default:"" }}';
    let devicesData = [];
    let alertPopupTimer = null;
    let detailMap = null;
    let jurisdictionPolygons = [];
    const RISK_COLORS = { normal: '#52c41a', warning: '#fa8c16', high_risk: '#ff4d4f', monitoring: '#1890FF', unavailable: '#ffffff', offline: '#666666', awaiting_data: '#722ed1' };
    // 头像标记生成函数 - 白底圆形头像 + 彩色风险环
    function createAvatarMarker(color) {
        return `<div style="
            width:44px;height:44px;border-radius:50%;
            border:3px solid ${color};
            background:#fff url('/static/images/officer-avatar.jpg') center/cover no-repeat;
            box-shadow: 0 0 12px ${color}66, 0 2px 8px rgba(0,0,0,0.5);
            cursor:pointer;
        "></div>`;
    }

    // ========== 地图初始化 ==========
    function onMapLoaded() {
        map = new AMap.Map('amap', {
            zoom: 5,
            center: [104.1954, 35.8617], // 中国地图中心
            mapStyle: 'amap://styles/darkblue',
            features: ['bg', 'road', 'building', 'point'],
        });
        map.on('complete', () => {
            refreshAll();
            setInterval(refreshAll, 10000); // 每10秒刷新
        });
    }

    // ========== 时间显示 ==========
    function updateTime() {
        const now = new Date();
        document.getElementById('live-time').textContent =
            now.toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit',
                hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
    }
    setInterval(updateTime, 1000);
    updateTime();

    // ========== 辖区多边形 ==========
    let visibleRegionCodes = [];  // 当前显示的区县 code

    function updateRegionPolygons(regionPolygons) {
        if (!map) return;

        // 清除旧多边形
        map.remove(jurisdictionPolygons);
        jurisdictionPolygons = [];
        visibleRegionCodes = [];

        if (!regionPolygons.length) {
            // 无人在任何辖区：清除限制
            map.clearLimitBounds();
            return;
        }

        // 收集所有坐标用于 bounds
        let allCoords = [];
        let globalBounds = null;

        regionPolygons.forEach((r, idx) => {
            const geom = r.geojson;
            if (!geom) return;

            let paths = [];
            if (geom.type === 'Polygon') {
                paths = geom.coordinates[0].map(c => [c[0], c[1]]);
            } else if (geom.type === 'MultiPolygon') {
                paths = geom.coordinates.map(poly =>
                    poly[0].map(c => [c[0], c[1]])
                );
            } else {
                return;
            }

            const flatCoords = Array.isArray(paths[0]) && Array.isArray(paths[0][0])
                ? paths.flat() : paths;
            flatCoords.forEach(c => allCoords.push(c));

            const lngs = flatCoords.map(c => c[0]);
            const lats = flatCoords.map(c => c[1]);
            const pb = new AMap.Bounds(
                [Math.min(...lngs), Math.min(...lats)],
                [Math.max(...lngs), Math.max(...lats)]
            );
            if (!globalBounds) globalBounds = pb;
            else {
                globalBounds = new AMap.Bounds(
                    [Math.min(globalBounds.southWest.lng, pb.southWest.lng),
                     Math.min(globalBounds.southWest.lat, pb.southWest.lat)],
                    [Math.max(globalBounds.northEast.lng, pb.northEast.lng),
                     Math.max(globalBounds.northEast.lat, pb.northEast.lat)]
                );
            }

            // 渐变色：不同区用不同颜色
            const hues = ['#1890FF', '#36CFC9', '#B37FEB', '#FFC53D', '#FF7A45'];
            const color = hues[idx % hues.length];

            const polygon = new AMap.Polygon({
                path: paths,
                fillColor: color,
                fillOpacity: 0.15,
                strokeColor: color,
                strokeWeight: 2,
                strokeOpacity: 0.7,
                strokeStyle: 'dashed',
                zIndex: 10,
            });

            // 标签
            const labelMarker = new AMap.Marker({
                position: [pb.getCenter().lng, pb.getCenter().lat],
                content: `<div style="
                    background:${color};color:#fff;font-size:11px;padding:2px 8px;
                    border-radius:10px;white-space:nowrap;opacity:0.85;
                ">${r.name}</div>`,
                offset: new AMap.Pixel(-20, -10),
                zIndex: 20,
            });

            polygon.setMap(map);
            labelMarker.setMap(map);
            jurisdictionPolygons.push(polygon);
            jurisdictionPolygons.push(labelMarker);
            visibleRegionCodes.push(r.code);
        });

        // 自动适配
        if (globalBounds && jurisdictionPolygons.length) {
            map.clearLimitBounds();
            map.setFitView(jurisdictionPolygons, false, [60, 60, 60, 60]);
            const z = map.getZoom();
            // 最小缩放=适配zoom-3（最多缩3级），最大=18（看细节）
            map.setZooms([Math.max(8, Math.floor(z) - 3), 20]);
            // 限制拖拽范围：比实际区域外扩0.3度
            const expand = 0.3;
            const expandedBounds = new AMap.Bounds(
                [globalBounds.southWest.lng - expand, globalBounds.southWest.lat - expand],
                [globalBounds.northEast.lng + expand, globalBounds.northEast.lat + expand]
            );
            map.setLimitBounds(expandedBounds);
        }
    }

    // ========== 数据刷新 ==========
    async function refreshAll() {
        await Promise.all([refreshStats(), refreshDevices(), refreshAlerts(), refreshJurisdiction()]);
    }

    // 独立加载辖区多边形——不管有没有设备都保证加载
    async function refreshJurisdiction() {
        if (!currentProjectId || !map) return;
        try {
            const resp = await fetch(`/api/projects/${currentProjectId}/jurisdiction/`);
            const data = await resp.json();
            const features = data.geojson?.features || [];
            // 转为 region_polygons 格式
            const polygons = features.map(f => ({
                code: f.properties?.code || '',
                name: f.properties?.name || '',
                geojson: f.geometry,
            })).filter(p => p.geojson);
            updateRegionPolygons(polygons);
        } catch(e) { console.error('加载辖区失败:', e); }
    }

    async function refreshStats() {
        try {
            const resp = await fetch(`/api/stats/?project_id=${currentProjectId}`);
            const data = await resp.json();
            document.getElementById('online-count').innerHTML = data.online_devices + '<span class="stat-unit">台</span>';
            document.getElementById('monitoring-count').innerHTML = (data.monitoring_devices || 0) + '<span class="stat-unit">台</span>';
            document.getElementById('unavailable-count').innerHTML = (data.unavailable_devices || 0) + '<span class="stat-unit">台</span>';
            document.getElementById('unavailable-count').innerHTML = (data.unavailable_devices || 0) + '<span class="stat-unit">台</span>';
            document.getElementById('awaiting-data-count').innerHTML = (data.awaiting_data_devices || 0) + '<span class="stat-unit">台</span>';
            document.getElementById('offline-count').innerHTML = data.offline_devices + '<span class="stat-unit">台</span>';
            const todayAlerts = data.today_alerts || 0;
            document.getElementById('today-alert-count').innerHTML = todayAlerts + '<span class="stat-unit">条</span>';
            // 顶栏今日预警徽标
            const badge = document.getElementById('alert-badge');
            if (todayAlerts > 0) {
                badge.textContent = todayAlerts;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
            updatePieChart(data.risk_stats);
        } catch(e) { console.error(e); }
    }

    function updatePieChart(stats) {
        const chartDom = document.getElementById('pie-chart');
        if (!chartDom) return;
        let chart = chartDom._echart;
        if (!chart) {
            chart = echarts.init(chartDom);
            chartDom._echart = chart;
        }
        chart.setOption({
            backgroundColor: 'transparent',
            tooltip: { trigger: 'item', formatter: '{b}: {c}人 ({d}%)' },
            series: [{
                type: 'pie',
                radius: ['50%', '75%'],
                center: ['50%', '50%'],
                avoidLabelOverlap: false,
                itemStyle: { borderRadius: 4, borderColor: 'rgba(10,14,23,0.8)', borderWidth: 3 },
                label: { show: true, position: 'outside', color: 'rgba(255,255,255,0.6)', fontSize: 11,
                    formatter: '{b}\n{d}%' },
                data: stats.map(s => ({ name: s.name, value: s.value, itemStyle: { color: s.color } })),
            }],
        });
    }

    async function refreshDevices() {
        try {
            const resp = await fetch(`/api/devices/?project_id=${currentProjectId}`);
            const data = await resp.json();
            devicesData = data.devices;
            updateMapMarkers(data.devices);
        } catch(e) { console.error(e); }
    }

    function updateMapMarkers(devices) {
        if (!map) return;
        // 清除旧标记
        Object.values(markers).forEach(m => m.setMap(null));
        markers = {};

        devices.forEach(device => {
            if (device.bind_status !== 'active') return;
            if (!device.is_online) return;
            const pos = [device.longitude, device.latitude];
            const color = RISK_COLORS[device.risk_level] || '#52c41a';
            const avatarHtml = createAvatarMarker(color);

            const marker = new AMap.Marker({
                position: pos,
                content: `<div style="cursor:pointer;position:relative;">
                    ${avatarHtml}
                    <div style="position:absolute;top:-18px;left:50%;transform:translateX(-50%);
                        background:${color};color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;
                        white-space:nowrap;">${device.officer_name} ${device.health.core_temperature ? device.health.core_temperature.toFixed(1)+'℃' : ''}</div>
                </div>`,
                offset: new AMap.Pixel(-22, -22),
                zIndex: 100,
            });

            marker.on('click', () => showDetailModal(device));
            marker.on('mouseover', () => {
                const info = `${device.officer_name}
心率:${device.health.heart_rate || '--'}bpm | 血氧:${device.health.blood_oxygen || '--'}%
血压:${device.health.blood_pressure_sys || '--'}/${device.health.blood_pressure_dia || '--'}mmHg
核心温度:${device.health.core_temperature ? device.health.core_temperature.toFixed(1) : '--'}℃`;
                marker.setLabel({ content: `<div style="background:rgba(0,0,0,0.8);color:#fff;padding:6px 10px;border-radius:4px;font-size:11px;white-space:pre-line;">${info}</div>`, direction: 'top' });
            });
            marker.on('mouseout', () => marker.setLabel({ content: '' }));

            marker.setMap(map);
            markers[device.id] = marker;
        });
    }

    async function refreshAlerts() {
        try {
            const resp = await fetch(`/api/alerts/?project_id=${currentProjectId}&limit=50`);
            const data = await resp.json();
            renderAlerts(data.alerts);
        } catch(e) { console.error(e); }
    }

    function renderAlerts(alerts) {
        const container = document.getElementById('alert-list');
        if (!alerts.length) {
            container.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:40px 0;font-size:13px;">暂无预警记录</div>';
            return;
        }
        container.innerHTML = alerts.map(a => `
            <div class="alert-item ${a.alert_type === 'high_risk' ? 'alert-high-risk' : 'alert-warning'}">
                <div class="alert-name">${a.officer_name} (${a.device_id})</div>
                <div class="alert-detail">
                    <span class="alert-temp" style="color:${a.alert_type==='high_risk'?'#ff4d4f':'#faad14'}">${a.core_temperature}℃</span>
                    &nbsp;心率:${a.heart_rate}bpm &nbsp;血氧:${a.blood_oxygen}%
                </div>
                <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;">${a.advice_text ? a.advice_text.replace(/\n/g,'<br>') : ''}</div>
                <div class="alert-time">⏰ ${a.created_at}</div>
            </div>
        `).join('');
    }

    // ========== 预警弹窗 ==========
    function showAlertPopup(alert) {
        const popup = document.getElementById('alert-popup');
        popup.className = alert.alert_type === 'high_risk' ? 'high-risk' : 'warning';
        document.getElementById('pop-alert-type').textContent = alert.alert_type_display;
        document.getElementById('pop-alert-icon').textContent = alert.alert_type === 'high_risk' ? '🚨' : '⚠️';
        document.getElementById('pop-name').textContent = alert.officer_name;
        document.getElementById('pop-device-id').textContent = alert.device_id;
        document.getElementById('pop-temp').textContent = alert.core_temperature + '℃';
        document.getElementById('pop-hr').textContent = alert.heart_rate + 'bpm';
        document.getElementById('pop-advice').textContent = alert.advice_text || '暂无建议';
        popup.style.display = 'block';
        // 30秒后自动消失
        if (alertPopupTimer) clearTimeout(alertPopupTimer);
        alertPopupTimer = setTimeout(closeAlertPopup, 30000);
    }

    function closeAlertPopup() {
        document.getElementById('alert-popup').style.display = 'none';
        if (alertPopupTimer) clearTimeout(alertPopupTimer);
    }

    async function confirmAlert() {
        // 模拟调用大模型接口生成建议
        const advice = generateAdvice();
        document.getElementById('pop-advice').textContent = advice;
        alert('✅ 已确认预警，建议已推送至民警手表端！\n\n' + advice);
        closeAlertPopup();
    }

    function generateAdvice() {
        const advices = [
            '1. 立即停止剧烈活动，就近寻找阴凉处休息\n2. 补充含电解质饮料500ml，30分钟后复测体温',
            '1. 转移至空调环境，解开领口散热\n2. 用湿毛巾冷敷颈部及腋下，持续监测体温',
            '1. 降低执勤强度，每15分钟饮水100-200ml\n2. 如体温持续升高超过39.5℃，立即呼叫医疗支援',
        ];
        return advices[Math.floor(Math.random() * advices.length)];
    }

    async function clearAlerts() {
        if (!confirm('确定清除所有预警记录？')) return;
        try {
            await fetch(`/api/alerts/clear/`, {
                method: 'POST',
                headers: {'X-CSRFToken': getCookie('csrftoken')},
                body: new URLSearchParams({ project_id: currentProjectId, keep: '10' }),
            });
            await refreshAlerts();
        } catch(e) { console.error(e); }
    }

    // ========== 民警详情弹窗 ==========
    async function showDetailModal(device) {
        try {
            const resp = await fetch(`/api/devices/${device.id}/`);
            const data = await resp.json();
            const d = data.device;
            const h = data.health;

            document.getElementById('modal-title').textContent = `👤 ${d.officer_name} - 详细数据`;
            document.getElementById('detail-info-grid').innerHTML = `
                <div class="info-item">
                    <div class="info-label">设备编号</div>
                    <div class="info-value" style="font-size:14px;">${d.device_id}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">资产编码</div>
                    <div class="info-value" style="font-size:14px;">${d.asset_code || '--'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">性别 / 年龄</div>
                    <div class="info-value" style="font-size:14px;">${d.officer_gender} / ${d.officer_age}岁</div>
                </div>
                <div class="info-item">
                    <div class="info-label">风险等级</div>
                    <div class="info-value" style="color:${RISK_COLORS[data.risk_level]}">${data.risk_text}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">心率 (bpm)</div>
                    <div class="info-value">${h.heart_rate || '--'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">血氧 (%)</div>
                    <div class="info-value">${h.blood_oxygen || '--'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">血压 (mmHg)</div>
                    <div class="info-value" style="font-size:14px;">${h.blood_pressure_sys || '--'} / ${h.blood_pressure_dia || '--'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">步频 (步/分)</div>
                    <div class="info-value">${h.step_frequency || '--'}</div>
                </div>
                <div class="info-item" style="grid-column:1/-1;">
                    <div class="info-label">核心温度 (℃)</div>
                    <div class="info-value" style="font-size:24px;color:${data.risk_level === 'high_risk' ? '#ff4d4f' : data.risk_level === 'warning' ? '#faad14' : '#52c41a'}">${h.core_temperature || '--'}℃</div>
                </div>
                <div class="info-item" style="grid-column:1/-1;">
                    <div class="info-label">上报时间</div>
                    <div class="info-value" style="font-size:13px;">${h.timestamp || '--'}</div>
                </div>
            `;

            document.getElementById('detail-modal').style.display = 'flex';

            // 展示轨迹小地图
            setTimeout(() => {
                if (data.trajectory.length > 0) {
                    const path = data.trajectory.map(p => [p.lng, p.lat]);
                    if (detailMap) detailMap.destroy();
                    detailMap = new AMap.Map('mini-map', {
                        zoom: 16,
                        center: path[path.length - 1],
                        mapStyle: 'amap://styles/darkblue',
                    });
                    new AMap.Polyline({
                        path: path,
                        strokeColor: '#1890FF',
                        strokeWeight: 3,
                        strokeOpacity: 0.8,
                        map: detailMap,
                    });
                    // 起点终点标记
                    new AMap.Marker({ position: path[0], content: '<div style="background:#52c41a;color:#fff;padding:2px 6px;border-radius:3px;font-size:10px;">起</div>', map: detailMap });
                    new AMap.Marker({ position: path[path.length-1], content: '<div style="background:#ff4d4f;color:#fff;padding:2px 6px;border-radius:3px;font-size:10px;">终</div>', map: detailMap });
                } else {
                    document.getElementById('mini-map').innerHTML = '<div style="color:rgba(255,255,255,0.3);text-align:center;padding-top:70px;">暂无轨迹数据</div>';
                }
            }, 300);
        } catch(e) { console.error(e); }
    }

    function closeDetailModal() {
        document.getElementById('detail-modal').style.display = 'none';
        if (detailMap) { detailMap.destroy(); detailMap = null; }
    }
    document.getElementById('detail-modal').addEventListener('click', function(e) {
        if (e.target === this) closeDetailModal();
    });

    // ========== 侧边栏折叠 ==========
    function toggleSidebar() {
        const panel = document.getElementById('right-panel');
        const btn = document.getElementById('sidebar-toggle');
        const isCollapsed = panel.classList.toggle('collapsed');
        btn.textContent = isCollapsed ? '▶' : '◀';
        // 折叠后地图容器右边界扩张
        const mapContainer = document.getElementById('map-container');
        mapContainer.style.right = isCollapsed ? '64px' : '320px';
        // 通知高德地图 resize
        setTimeout(() => { if (map) map.resize(); }, 350);
    }

    // ========== 工具函数 ==========
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
