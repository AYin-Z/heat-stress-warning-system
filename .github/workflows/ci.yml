name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  bridge:
    name: Bridge contract tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: bridge/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m py_compile bridge.py
      - run: python -m unittest -v test_bridge.py

  frontend:
    name: Frontend (Django 大屏) — check + migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: frontend/requirements.txt
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libgeos-dev
      - run: pip install -r requirements.txt
      - run: cp heatstress/settings.py.example heatstress/settings.py
      - run: python -m py_compile core/models.py core/views.py core/urls.py core/mqtt_client.py
      - run: python manage.py check
      - run: python manage.py migrate

  watch:
    name: Watch unit tests and debug build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: watch-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew --no-daemon testDebugUnitTest assembleDebug
